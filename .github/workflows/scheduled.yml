name: Scheduled run

on:
  schedule:
    # Every 30 minutes, offset by :00/:30 so the five sibling agents
    # (cert-sentinel, status-watch, ci-triage, alert-dedupe, backup-audit)
    # don't all hit aiopsenabler.com in the same minute.
    - cron: "0,30 * * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ".[report]"
      - run: cert-sentinel
        env:
          CERT_SENTINEL_AGENT_KEY_ID: ${{ secrets.CERT_SENTINEL_AGENT_KEY_ID }}
          CERT_SENTINEL_AGENT_SECRET: ${{ secrets.CERT_SENTINEL_AGENT_SECRET }}
